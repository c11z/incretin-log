<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incretin Log</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📉</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
</head>
<body>
  <header>
    <h1>Incretin Log</h1>
    <nav id="tab-nav">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="measurement">Measurement</button>
      <button class="tab-btn" data-tab="admin">Admin</button>
    </nav>
  </header>

  <main>
    <div class="tab-panel active" data-tab-panel="dashboard">
      <section id="charts-section">
        <div class="chart-container" id="chart-weight"></div>
        <div class="chart-container" id="chart-waist"></div>
        <div class="chart-container" id="chart-bmi"></div>
        <div class="chart-container" id="chart-wthr"></div>
        <div class="chart-container" id="chart-wow"></div>
      </section>
    </div>

    <div class="tab-panel" data-tab-panel="measurement">
      <section id="table-section">
        <div class="table-wrap">
          <table id="measurement-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Weight</th>
                <th>Waist</th>
                <th>Dose</th>
                <th>Pen</th>
                <th>WoW</th>
                <th>%</th>
                <th>Mean</th>
                <th>BMI</th>
                <th>WtHR</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>

    <div class="tab-panel" data-tab-panel="admin">
      <div id="admin-lock">
        <p>Admin features are unavailable without an API key.</p>
        <div id="api-key-section">
          <input type="password" id="api-key-input" placeholder="Enter API Key">
          <button id="api-key-save">Unlock</button>
        </div>
      </div>
      <div id="admin-content">
        <section id="entry-form-section">
          <h2>Add / Update Entry</h2>
          <form id="entry-form">
            <div class="form-row">
              <input type="text" id="f-date" required pattern="\d{4}-\d{2}-\d{2}" placeholder="yyyy-mm-dd">
              <input type="number" id="f-weight" step="0.1" min="0" required placeholder="Weight (kg)">
              <input type="number" id="f-waist" step="1" min="0" required placeholder="Waist (cm)">
              <select id="f-dose">
                <option value="0 mg">0 mg</option>
                <option value="2.5 mg">2.5 mg</option>
                <option value="5.0 mg" selected>5.0 mg</option>
                <option value="7.5 mg">7.5 mg</option>
                <option value="10.0 mg">10.0 mg</option>
                <option value="12.5 mg">12.5 mg</option>
                <option value="15.0 mg">15.0 mg</option>
              </select>
              <input type="number" id="f-pen" step="1" min="0" required placeholder="Pen #">
            </div>
            <div class="form-actions">
              <button type="submit" id="f-submit">Save</button>
            </div>
          </form>
        </section>
        <button id="api-key-clear">Clear API Key</button>
        <section id="admin-table-section">
          <div class="table-wrap">
            <table id="admin-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Weight</th>
                  <th>Waist</th>
                  <th>Dose</th>
                  <th>Pen</th>
                  <th></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
